<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío 1 - JavaScript</title>
    <link rel="stylesheet" href="asset/style/estilos.css">
</head>

<body>
    

    <section>
        <div class="card">
            <div class="img-card"><img class="pc" src="asset/img/laptop.jpg" alt="Pc_Gamer"></div>
              <h6>Laptop Gamer AMD</h6>
              <p>Precio base: $<span class="precio-inicial"></span> </p>
        
              <p>Cantidad:
                <span id="numero">0</span>
                <button
                onclick="
                let cantidad = document.querySelector('#numero')
                
                let cuenta = Number(cantidad.textContent)

                let suma = cuenta + 1

                cantidad.textContent = suma
                "
                >+</button>
<!--resta-->
                <button
                onclick="
                let cantidad2 = document.querySelector('#numero')
                
                let cuenta2 = Number(cantidad2.textContent)

                let resta = cuenta2 - 1

                cantidad2.textContent = resta
                "
                
                >-</button>
              </p>
            </div>

        </div>
    </section>

    <div class="total-section">
        <p>Total a pagar: $<span class="valor-total"></span> </p>
    </div>

    <script src="asset/js/index.js">
      

    </script>
</body>
</html>
