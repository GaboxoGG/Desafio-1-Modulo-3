<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío 1 - JavaScript</title>
    <link rel="stylesheet" href="asset/style/estilos.css">
</head>

<body>
    

    <section>
        <div class="card">
            <div class="img-card"><img class="pc" src="asset/img/laptop.jpg" alt="Pc_Gamer"></div>
              <h6>Laptop Gamer AMD</h6>
              <p>Precio base: $<span class="precio-inicial"></span> </p>
        
              <p>Cantidad:
                <span class="numero">0</span>
                <button
                onclick="
                let cantidad = document.querySelector('.numero');
                
                let cuenta = Number(cantidad.textContent);

                let suma = cuenta + 1;
                
                cantidad.textContent = suma;

                let total = suma * precio;
                document.querySelector('.valor-total').textContent = total;
                "
                >+</button>
<!--resta-->
                <button
                onclick="
                let cantidad = document.querySelector('.numero');
                
                let cuenta2 = Number(cantidad.textContent);

                let sustraccion = cuenta2 - 1;

                cantidad.textContent = sustraccion;

                let total2 = sustraccion * precio;
                document.querySelector('.valor-total').textContent = total2;

                
                "
                
                >-</button>
              </p>
            </div>

        </div>
    </section>

    <div class="total-section">
        <p>Total a pagar: $<span class="valor-total">0</span> </p>
    </div>

    <script src="asset/jc/index.js">
      

    </script>
</body>
</html>
